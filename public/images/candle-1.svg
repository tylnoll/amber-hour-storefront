<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#251B10"/>
      <stop offset="100%" stop-color="#16111F"/>
    </radialGradient>
    <radialGradient id="warmglow" cx="50%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#E8A54B" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#C4562E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8A54B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse" cx="380" cy="350" r="160">
      <stop offset="0%" stop-color="#8B5B2A" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#B07830" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7A4820" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="glassside" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B3E10" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#C87830" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#B06020" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5A3208" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#FFF5C0"/>
      <stop offset="35%" stop-color="#F4C040"/>
      <stop offset="70%" stop-color="#E8622A"/>
      <stop offset="100%" stop-color="#C4562E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <!-- Warm ambient glow behind candle -->
  <ellipse cx="400" cy="330" rx="260" ry="210" fill="url(#warmglow)"/>
  <!-- Candle vessel body -->
  <rect x="290" y="275" width="220" height="220" rx="16" fill="url(#glassside)" stroke="#C87830" stroke-width="1.5"/>
  <!-- Glass sheen left -->
  <rect x="294" y="280" width="18" height="208" rx="6" fill="#F4C06A" opacity="0.12"/>
  <!-- Glass sheen right -->
  <rect x="488" y="280" width="14" height="208" rx="5" fill="#000" opacity="0.15"/>
  <!-- Wax surface -->
  <ellipse cx="400" cy="300" rx="106" ry="22" fill="#F4E4B0" opacity="0.92"/>
  <!-- Wax pool highlight -->
  <ellipse cx="390" cy="298" rx="60" ry="10" fill="#FFF5DC" opacity="0.55"/>
  <!-- Wick -->
  <line x1="400" y1="298" x2="400" y2="265" stroke="#3A2A10" stroke-width="3" stroke-linecap="round"/>
  <!-- Wick glow base -->
  <ellipse cx="400" cy="265" rx="8" ry="5" fill="#F4C040" opacity="0.8"/>
  <!-- Flame outer -->
  <path d="M400 265 Q388 242 392 218 Q396 196 400 180 Q404 196 408 218 Q412 242 400 265Z" fill="url(#flame)" opacity="0.9"/>
  <!-- Flame inner -->
  <path d="M400 262 Q393 244 396 226 Q398 212 400 202 Q402 212 404 226 Q407 244 400 262Z" fill="#FFF8C0" opacity="0.85"/>
  <!-- Flame flicker highlight -->
  <ellipse cx="400" cy="224" rx="5" ry="16" fill="#FFFBE8" opacity="0.6"/>
  <!-- Label on glass -->
  <rect x="308" y="335" width="184" height="90" rx="4" fill="#1A1010" opacity="0.5"/>
  <text x="400" y="360" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#E8A54B" letter-spacing="4" opacity="0.85">AMBER HOUR</text>
  <text x="400" y="384" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-style="italic" fill="#FBF1E1" opacity="0.9">Two-Way</text>
  <text x="400" y="406" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-style="italic" fill="#FBF1E1" opacity="0.9">Candle</text>
  <!-- Vessel base -->
  <rect x="285" y="489" width="230" height="16" rx="8" fill="#5A3208" opacity="0.6"/>
  <!-- Floor shadow -->
  <ellipse cx="400" cy="510" rx="145" ry="14" fill="#000" opacity="0.4"/>
</svg>
