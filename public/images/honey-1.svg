<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg5" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#2A1E06"/>
      <stop offset="100%" stop-color="#16111F"/>
    </radialGradient>
    <radialGradient id="honeyglow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#E8A54B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8A54B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jar" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#E8A030" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#C87818" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#8A4E08" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="jarlid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4922A"/>
      <stop offset="100%" stop-color="#A06A10"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg5)"/>
  <ellipse cx="400" cy="320" rx="230" ry="190" fill="url(#honeyglow)"/>
  <!-- Jar body -->
  <path d="M300 230 Q295 225 293 350 Q292 410 400 430 Q508 410 507 350 Q505 225 500 230Z" fill="url(#jar)" stroke="#D4922A" stroke-width="1.5"/>
  <!-- Glass sheen left -->
  <path d="M305 240 Q302 260 302 350 Q302 390 316 412" fill="none" stroke="#FFFBE8" stroke-width="8" stroke-linecap="round" opacity="0.18"/>
  <!-- Glass sheen right -->
  <path d="M490 250 Q492 270 492 360 Q490 400 476 422" fill="none" stroke="#000" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
  <!-- Honey highlight at top inside jar -->
  <ellipse cx="400" cy="240" rx="90" ry="18" fill="#F4D060" opacity="0.55"/>
  <!-- Lid -->
  <rect x="288" y="195" width="224" height="42" rx="10" fill="url(#jarlid)" stroke="#D4922A" stroke-width="1.5"/>
  <!-- Lid top sheen -->
  <rect x="295" y="199" width="200" height="10" rx="4" fill="#E8C060" opacity="0.35"/>
  <!-- Lid ring -->
  <rect x="292" y="228" width="216" height="12" rx="3" fill="#8A5A08" opacity="0.6"/>
  <!-- Label area -->
  <rect x="315" y="258" width="170" height="130" rx="6" fill="#2A1800" opacity="0.45"/>
  <!-- Honeycomb hex background -->
  <text x="400" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#E8A54B" opacity="0.2">⬡⬡⬡</text>
  <!-- Brand -->
  <text x="400" y="296" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#E8A54B" letter-spacing="4">AMBER HOUR</text>
  <!-- Product name -->
  <text x="400" y="324" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-style="italic" fill="#FBF1E1">Raw CBD</text>
  <text x="400" y="346" text-anchor="middle" font-family="Georgia,serif" font-size="17" font-style="italic" fill="#FBF1E1">Honey</text>
  <!-- CBD info -->
  <text x="400" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#C8A040" letter-spacing="2">35mg CBD · NEVER BOILED</text>
  <!-- Honey drip on right side of jar -->
  <path d="M496 290 Q502 310 498 340 Q496 360 498 375 Q500 390 496 398" fill="none" stroke="#E8A030" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  <ellipse cx="496" cy="402" rx="8" ry="10" fill="#E8A030" opacity="0.7"/>
  <!-- Small honey drop -->
  <path d="M475 410 Q478 420 476 428" fill="none" stroke="#E8A030" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <ellipse cx="476" cy="432" rx="5" ry="7" fill="#E8A030" opacity="0.5"/>
  <!-- Shadow -->
  <ellipse cx="400" cy="448" rx="135" ry="12" fill="#000" opacity="0.38"/>
</svg>
